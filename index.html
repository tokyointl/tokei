<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>残り時間計算</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Shippori+Mincho:wght@500;700&family=Zen+Kaku+Gothic+New:wght@400;500;700&display=swap');

  :root {
    --ink: #12151C;
    --surface: #1A1E28;
    --surface-2: #20242F;
    --parchment: #EDE7DA;
    --muted: #8B93A6;
    --gold: #C9A227;
    --vermilion: #B5473F;
    --line: #2A2F3B;
  }

  * { box-sizing: border-box; }

  body {
    margin: 0;
    background-color: var(--ink);
    color: var(--parchment);
    font-family: 'Zen Kaku Gothic New', sans-serif;
    min-height: 100vh;
    display: flex;
    justify-content: center;
    padding: 40px 16px;
  }

  .wrap { width: 100%; max-width: 720px; }

  .eyebrow {
    font-size: 12px;
    letter-spacing: 0.3em;
    color: var(--muted);
    margin-bottom: 8px;
  }

  h1 {
    font-family: 'Shippori Mincho', serif;
    font-size: 38px;
    margin: 0 0 8px;
    color: var(--parchment);
  }

  .subtitle {
    font-size: 16px;
    color: var(--muted);
    margin: 0 0 40px;
  }

  .panel {
    background: var(--surface);
    border: 1px solid var(--line);
    border-radius: 10px;
    padding: 20px;
    margin-bottom: 32px;
  }

  .inputs {
    display: grid;
    grid-template-columns: 1fr;
    gap: 20px;
  }
  @media (min-width: 640px) {
    .inputs { grid-template-columns: repeat(auto-fit, minmax(170px, 1fr)); }
    .stats { grid-template-columns: 1fr 1fr; }
  }

  label { display: flex; flex-direction: column; gap: 6px; }

  label span {
    font-size: 18px;
    color: var(--muted);
  }

  input {
    background: var(--surface-2);
    border: 1px solid var(--line);
    color: var(--parchment);
    border-radius: 6px;
    padding: 9px 12px;
    font-size: 14px;
    font-family: inherit;
    outline: none;
    width: 100%;
  }
  input::-webkit-calendar-picker-indicator { filter: invert(0.7); }
  input:focus { border-color: var(--gold); }

  .stats {
    display: grid;
    grid-template-columns: 1fr;
    gap: 16px;
    margin-bottom: 32px;
  }

  .card {
    background: var(--surface);
    border: 1px solid var(--line);
    border-radius: 10px;
    padding: 24px;
  }

  .card-label {
    font-size: 22px;
    color: var(--muted);
    margin-bottom: 12px;
    font-weight: 700;
  }

  .card-value {
    font-family: 'Shippori Mincho', serif;
    font-size: 58px;
    margin-bottom: 4px;
    line-height: 1.2;
  }

  .card-value .unit {
    font-family: 'Zen Kaku Gothic New', sans-serif;
    font-size: 22px;
    color: var(--muted);
    margin-right: 10px;
  }

  .card-sub {
    font-size: 21px;
    color: var(--muted);
    margin-top: 14px;
    line-height: 2;
  }

  .card-sub .highlight {
    color: var(--parchment);
    font-weight: 700;
    font-size: 1.05em;
  }

  .event-note {
    margin-top: 16px;
    padding-left: 14px;
    border-left: 3px solid var(--gold);
    font-size: 16px;
    color: var(--parchment);
    line-height: 1.7;
  }

  .event-note .event-year {
    color: var(--gold);
    font-weight: 700;
  }

  .ruler-title {
    font-size: 22px;
    color: var(--muted);
    margin-bottom: 16px;
    font-weight: 700;
  }

  .legend {
    display: flex;
    gap: 24px;
    margin-top: 16px;
    font-size: 14px;
    color: var(--muted);
  }

  .legend-item { display: flex; align-items: center; gap: 8px; }

  .dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    display: inline-block;
  }

  .hourglass-wrap {
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 8px 0 4px;
  }

  .hourglass-caption {
    font-size: 18px;
    color: var(--muted);
    margin-top: 14px;
    text-align: center;
  }

  .hourglass-caption .age {
    color: var(--parchment);
    font-family: 'Shippori Mincho', serif;
    font-size: 24px;
  }

  #sandTop, #sandBottom {
    transition: y 0.6s ease, height 0.6s ease;
  }

  .grain {
    fill: var(--gold);
    opacity: 0;
    animation: fall 1.3s linear infinite;
  }
  .grain:nth-child(2) { animation-delay: 0.43s; }
  .grain:nth-child(3) { animation-delay: 0.86s; }

  @keyframes fall {
    0%   { transform: translateY(0px);  opacity: 0; }
    8%   { opacity: 1; }
    85%  { opacity: 1; }
    100% { transform: translateY(16px); opacity: 0; }
  }
</style>
</head>
<body>
<div class="wrap">
  <div class="eyebrow">REMAINING TIME</div>
  <h1>残り時間計算</h1>
  <p class="subtitle">現在の年齢・平均寿命・就労可能年齢から、残された時間を可視化します。</p>

  <div class="panel">
    <div class="inputs">
      <label>
        <span>現在の年齢</span>
        <input type="number" id="currentAgeInput" value="60" step="0.1" min="0">
      </label>
      <label>
        <span>平均寿命（歳）</span>
        <input type="number" id="lifeExpectancy" value="84">
      </label>
      <label>
        <span>就労可能年齢（歳）</span>
        <input type="number" id="workEndAge" value="70">
      </label>
      <label>
        <span>1日の控除時間（睡眠等）</span>
        <input type="number" id="dailyDeduction" value="8" step="0.5" min="0" max="24">
      </label>
    </div>
  </div>

  <div class="stats">
    <div class="card">
      <div class="card-label">平均寿命まで</div>
      <div class="card-value" id="lifeValue" style="color: var(--gold);">-</div>
      <div class="card-sub" id="lifeSub"></div>
      <div class="event-note" id="lifeEventNote"></div>
    </div>
    <div class="card">
      <div class="card-label">就労可能年齢まで</div>
      <div class="card-value" id="workValue" style="color: var(--vermilion);">-</div>
      <div class="card-sub" id="workSub"></div>
      <div class="event-note" id="workEventNote"></div>
    </div>
  </div>

  <div class="panel">
    <div class="ruler-title" id="rulerTitle">人生の砂時計</div>
    <div class="hourglass-wrap">
      <svg viewBox="0 0 200 300" width="200" height="300">
        <defs>
          <clipPath id="topClip">
            <polygon points="25,24 175,24 105,150 95,150" />
          </clipPath>
          <clipPath id="bottomClip">
            <polygon points="95,150 105,150 175,276 25,276" />
          </clipPath>
        </defs>

        <!-- frame -->
        <rect x="20" y="10" width="160" height="8" rx="4" fill="none" stroke="var(--line)" stroke-width="2" />
        <rect x="20" y="282" width="160" height="8" rx="4" fill="none" stroke="var(--line)" stroke-width="2" />
        <line x1="25" y1="18" x2="25" y2="24" stroke="var(--line)" stroke-width="2" />
        <line x1="175" y1="18" x2="175" y2="24" stroke="var(--line)" stroke-width="2" />
        <line x1="25" y1="276" x2="25" y2="282" stroke="var(--line)" stroke-width="2" />
        <line x1="175" y1="276" x2="175" y2="282" stroke="var(--line)" stroke-width="2" />

        <!-- glass outline -->
        <polygon points="25,24 175,24 105,150 95,150" fill="none" stroke="var(--line)" stroke-width="2" stroke-linejoin="round" />
        <polygon points="95,150 105,150 175,276 25,276" fill="none" stroke="var(--line)" stroke-width="2" stroke-linejoin="round" />

        <!-- sand -->
        <rect id="sandTop" x="15" y="24" width="170" height="0" fill="var(--gold)" clip-path="url(#topClip)" />
        <rect id="sandBottom" x="15" y="150" width="170" height="0" fill="var(--gold)" clip-path="url(#bottomClip)" />

        <!-- falling grains -->
        <circle class="grain" cx="98" cy="150" r="1.6" />
        <circle class="grain" cx="100" cy="150" r="1.6" />
        <circle class="grain" cx="102" cy="150" r="1.6" />

        <!-- work-end marker -->
        <line id="workMarkerLine" x1="60" y1="200" x2="140" y2="200" stroke="var(--vermilion)" stroke-width="2" stroke-dasharray="4 3" />
      </svg>
      <div class="hourglass-caption">
        現在 <span class="age" id="ageCaption">-</span> 歳 ／ 経過 <span class="age" id="pctCaption">-</span>%
      </div>
    </div>
    <div class="legend">
      <div class="legend-item"><span class="dot" style="background: var(--gold);"></span>落ちた砂＝経過した時間</div>
      <div class="legend-item"><span class="dot" style="background: var(--vermilion);"></span><span id="legendWorkLabel">就労可能期限</span></div>
    </div>
  </div>
</div>

<script>
  const MS_PER_DAY = 86400000;
  const MS_PER_YEAR = 365.2425 * MS_PER_DAY;

  function splitDuration(ms) {
    const clamped = Math.max(0, ms);
    const totalDays = Math.floor(clamped / MS_PER_DAY);
    const years = Math.floor(totalDays / 365.2425);
    const remDaysAfterYears = Math.floor(totalDays - years * 365.2425);
    const months = Math.floor(remDaysAfterYears / 30.4369);
    const days = Math.floor(remDaysAfterYears - months * 30.4369);
    const totalHours = Math.floor(clamped / 3600000);
    return { years, months, days, totalDays, totalHours };
  }

  function fmt(n) { return n.toLocaleString('ja-JP'); }

  // 年間隔を具体的に把握するための、著名な出来事の年表（日本史・世界史）
  const HISTORICAL_EVENTS = {
    1868: '明治維新',
    1904: '日露戦争開戦',
    1912: '明治から大正へ改元',
    1914: '第一次世界大戦勃発',
    1918: '第一次世界大戦終結',
    1923: '関東大震災',
    1929: '世界恐慌（ウォール街大暴落）',
    1931: '満州事変',
    1937: '日中戦争勃発（盧溝橋事件）',
    1939: '第二次世界大戦勃発（独のポーランド侵攻）',
    1941: '太平洋戦争開戦（真珠湾攻撃）',
    1945: '第二次世界大戦終結・広島＆長崎への原爆投下',
    1946: '日本国憲法公布',
    1947: '日本国憲法施行',
    1950: '朝鮮戦争勃発',
    1951: 'サンフランシスコ平和条約調印',
    1953: 'テレビ放送開始（NHK）',
    1955: '55年体制成立',
    1956: '日本、国際連合に加盟',
    1959: 'キューバ革命',
    1960: '日米安保条約改定（安保闘争）',
    1961: 'ベルリンの壁構築',
    1963: 'ケネディ米大統領暗殺',
    1964: '東京オリンピック開催・東海道新幹線開業',
    1968: '小笠原諸島が日本に返還',
    1969: 'アポロ11号、人類初の月面着陸',
    1970: '大阪万博開催',
    1972: '沖縄返還・日中国交正常化・札幌オリンピック',
    1973: '第一次オイルショック',
    1978: '日中平和友好条約締結',
    1979: '第二次オイルショック',
    1985: 'プラザ合意・日航機墜落事故',
    1986: 'チェルノブイリ原発事故',
    1989: '昭和天皇崩御・平成へ改元、ベルリンの壁崩壊',
    1990: '東西ドイツ統一',
    1991: 'ソビエト連邦崩壊・湾岸戦争',
    1995: '阪神・淡路大震災、地下鉄サリン事件、Windows95発売',
    1997: '京都議定書採択、消費税5%へ',
    2000: 'シドニーオリンピック開催',
    2001: '米同時多発テロ（9.11）',
    2002: 'サッカーワールドカップ日韓共催',
    2003: 'イラク戦争開始',
    2004: 'スマトラ島沖地震',
    2008: 'リーマン・ショック',
    2009: '民主党への政権交代',
    2011: '東日本大震災・福島第一原発事故',
    2012: '東京スカイツリー開業',
    2014: '消費税8%へ',
    2016: '熊本地震',
    2019: '平成から令和へ改元、消費税10%へ',
    2020: '新型コロナウイルスの感染拡大・東京五輪延期決定',
    2021: '東京オリンピック開催（延期分）',
    2022: 'ロシアによるウクライナ侵攻開始',
    2023: '新型コロナが感染症法上5類へ移行',
    2024: '令和6年能登半島地震',
    2025: '大阪・関西万博開催',
  };

  function findHistoricalEvent(targetYear) {
    if (HISTORICAL_EVENTS[targetYear]) {
      return { year: targetYear, text: HISTORICAL_EVENTS[targetYear], exact: true };
    }
    for (let offset = 1; offset <= 6; offset++) {
      if (HISTORICAL_EVENTS[targetYear - offset]) {
        return { year: targetYear - offset, text: HISTORICAL_EVENTS[targetYear - offset], exact: false };
      }
      if (HISTORICAL_EVENTS[targetYear + offset]) {
        return { year: targetYear + offset, text: HISTORICAL_EVENTS[targetYear + offset], exact: false };
      }
    }
    return null;
  }

  const currentAgeEl = document.getElementById('currentAgeInput');
  const lifeExpectancyEl = document.getElementById('lifeExpectancy');
  const workEndAgeEl = document.getElementById('workEndAge');
  const dailyDeductionEl = document.getElementById('dailyDeduction');

  // 入力された年齢と、その入力時刻を基準に経過時間を加算していく
  let baseAge = Number(currentAgeEl.value);
  let baseTimestamp = Date.now();
  currentAgeEl.addEventListener('input', () => {
    baseAge = Number(currentAgeEl.value) || 0;
    baseTimestamp = Date.now();
  });

  function render() {
    const lifeExpectancy = Number(lifeExpectancyEl.value);
    const workEndAge = Number(workEndAgeEl.value);
    if (!lifeExpectancy || !workEndAge) return;

    const now = Date.now();
    const currentAge = baseAge + (now - baseTimestamp) / MS_PER_YEAR;

    const remainingLifeYears = Math.max(0, lifeExpectancy - currentAge);
    const remainingWorkYears = Math.max(0, workEndAge - currentAge);

    const remainingLife = splitDuration(remainingLifeYears * MS_PER_YEAR);
    const remainingWork = splitDuration(remainingWorkYears * MS_PER_YEAR);

    const workingDaysPerYear = 245; // 概算：週休二日+祝日・年末年始を控除
    const remainingWorkingDaysApprox = Math.max(0, Math.floor((remainingWork.totalDays / 365.2425) * workingDaysPerYear));

    // --- 睡眠等の日常時間を控除した「可処分時間」 ---
    const dailyDeduction = Math.min(24, Math.max(0, Number(dailyDeductionEl.value) || 0));
    const usableFraction = (24 - dailyDeduction) / 24;
    const usableLife = splitDuration(remainingLifeYears * MS_PER_YEAR * usableFraction);
    const usableWork = splitDuration(remainingWorkYears * MS_PER_YEAR * usableFraction);

    document.getElementById('lifeValue').innerHTML =
      `${remainingLife.years}<span class="unit">年</span>${remainingLife.months}<span class="unit">ヶ月</span>${remainingLife.days}<span class="unit">日</span>`;
    document.getElementById('lifeSub').innerHTML =
      `合計 <span class="highlight">${fmt(remainingLife.totalDays)} 日</span>／<span class="highlight">${fmt(remainingLife.totalHours)} 時間</span><br>` +
      `可処分時間（1日${dailyDeduction}時間を控除）：${usableLife.years}年${usableLife.months}ヶ月${usableLife.days}日<br>` +
      `　→ <span class="highlight">${fmt(usableLife.totalDays)} 日</span>／<span class="highlight">${fmt(usableLife.totalHours)} 時間</span>`;

    const nowYear = new Date(now).getFullYear();
    const yearsBack = remainingLife.years;
    const eventEl = document.getElementById('lifeEventNote');
    if (yearsBack <= 0) {
      eventEl.innerHTML = '平均寿命まであとわずかです。';
    } else {
      const targetYear = nowYear - yearsBack;
      const found = findHistoricalEvent(targetYear);
      if (found) {
        const approx = found.exact ? '' : '頃・';
        eventEl.innerHTML =
          `今から <span class="event-year">${yearsBack}年</span> 前 ＝ <span class="event-year">${found.year}年</span>${approx}：${found.text}`;
      } else {
        eventEl.innerHTML = `今から <span class="event-year">${yearsBack}年</span> 前 ＝ <span class="event-year">${targetYear}年</span>`;
      }
    }

    document.getElementById('workValue').innerHTML =
      `${remainingWork.years}<span class="unit">年</span>${remainingWork.months}<span class="unit">ヶ月</span>${remainingWork.days}<span class="unit">日</span>`;
    document.getElementById('workSub').innerHTML =
      `合計 <span class="highlight">${fmt(remainingWork.totalDays)} 日</span>／<span class="highlight">${fmt(remainingWork.totalHours)} 時間</span><br>` +
      `実労働日数（概算・年245日換算）：<span class="highlight">${fmt(remainingWorkingDaysApprox)} 日</span><br>` +
      `可処分時間（1日${dailyDeduction}時間を控除）：${usableWork.years}年${usableWork.months}ヶ月${usableWork.days}日<br>` +
      `　→ <span class="highlight">${fmt(usableWork.totalDays)} 日</span>／<span class="highlight">${fmt(usableWork.totalHours)} 時間</span>`;

    const workYearsBack = remainingWork.years;
    const workEventEl = document.getElementById('workEventNote');
    if (workYearsBack <= 0) {
      workEventEl.innerHTML = '就労可能年齢まであとわずかです。';
    } else {
      const workTargetYear = nowYear - workYearsBack;
      const workFound = findHistoricalEvent(workTargetYear);
      if (workFound) {
        const workApprox = workFound.exact ? '' : '頃・';
        workEventEl.innerHTML =
          `今から <span class="event-year">${workYearsBack}年</span> 前 ＝ <span class="event-year">${workFound.year}年</span>${workApprox}：${workFound.text}`;
      } else {
        workEventEl.innerHTML = `今から <span class="event-year">${workYearsBack}年</span> 前 ＝ <span class="event-year">${workTargetYear}年</span>`;
      }
    }

    document.getElementById('legendWorkLabel').textContent = `就労可能期限（${workEndAge}歳）`;

    // --- 砂時計の描画 ---
    const NECK_Y = 150, TOP_Y = 24, BOTTOM_Y = 276;
    const NECK_HALF = 5, BOTTOM_HALF = 75;

    const pLife = Math.min(1, Math.max(0, currentAge / lifeExpectancy));
    const workMarkFraction = Math.min(1, Math.max(0, workEndAge / lifeExpectancy));

    const sandTop = document.getElementById('sandTop');
    const topSandY = NECK_Y - (1 - pLife) * (NECK_Y - TOP_Y);
    sandTop.setAttribute('y', topSandY);
    sandTop.setAttribute('height', Math.max(0, NECK_Y - topSandY));

    const sandBottom = document.getElementById('sandBottom');
    sandBottom.setAttribute('height', Math.max(0, pLife * (BOTTOM_Y - NECK_Y)));

    const markerY = NECK_Y + workMarkFraction * (BOTTOM_Y - NECK_Y);
    const markerHalfWidth = NECK_HALF + (markerY - NECK_Y) / (BOTTOM_Y - NECK_Y) * (BOTTOM_HALF - NECK_HALF);
    const markerLine = document.getElementById('workMarkerLine');
    markerLine.setAttribute('x1', 100 - markerHalfWidth);
    markerLine.setAttribute('x2', 100 + markerHalfWidth);
    markerLine.setAttribute('y1', markerY);
    markerLine.setAttribute('y2', markerY);

    document.getElementById('ageCaption').textContent = currentAge.toFixed(1);
    document.getElementById('pctCaption').textContent = (pLife * 100).toFixed(1);
  }

  [currentAgeEl, lifeExpectancyEl, workEndAgeEl, dailyDeductionEl].forEach(el => el.addEventListener('input', render));
  render();
  setInterval(render, 1000);
</script>
</body>
</html>
